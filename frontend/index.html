<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy.
      This dev-friendly policy permits Vite's HMR (inline/eval + ws) and the
      backend on 127.0.0.1. Phase 5 ships the STRICT packaged policy
      (script-src 'self'; object-src 'none'; frame-ancestors 'none';
      connect-src 'self') via Electron — the bundled build needs no inline/eval.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: blob:;
               font-src 'self' data:;
               connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:* ws:;
               object-src 'none';
               frame-ancestors 'none';"
    />
    <title>CF Wavescan Analyzer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
